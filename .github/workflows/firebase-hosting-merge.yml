name: Deploy to Firebase Hosting on Merge

on:
  push:
    branches:
      - main

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies & Build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyC7vrX75F5ecT7D9Fxn0Jwm8FRZkcLt7Ag
          VITE_FIREBASE_AUTH_DOMAIN: check-mate-6e0a7.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: check-mate-6e0a7
          VITE_FIREBASE_STORAGE_BUCKET: check-mate-6e0a7.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "174197703540"
          VITE_FIREBASE_APP_ID: "1:174197703540:web:fe27c5b2b3366295de6221"
        run: npm ci && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_CHECK_MATE_6E0A7 }}
          channelId: live
          projectId: check-mate-6e0a7
